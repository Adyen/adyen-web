sonar.host.url=https://sonarcloud.io
sonar.organization=adyen
sonar.projectKey=Adyen_adyen-web
sonar.sourceEncoding=UTF-8

sonar.javascript.lcov.reportPaths=./packages/lib/coverage/lcov.info

sonar.sources=packages/lib/src

#----------------------------------------------------------------------
# INCLUDED FILES
#----------------------------------------------------------------------

# Test files are within the source directory and identified by pattern.
sonar.test.inclusions=**/*.test.*

#----------------------------------------------------------------------
# EXCLUDED FILES
#----------------------------------------------------------------------

# Exclude files from quality code checks
sonar.exclusions=\
  **/stories/**/*,\
  **/*.stories.*,\
  **/types.ts,\
  **/SecuredFields/lib/CSF/utils/cardType.ts


#----------------------------------------------------------------------
# IGNORED RULES
#----------------------------------------------------------------------

# typescript:S7764: Prefer `globalThis` over `window`
# Suppressed because the SDK runs exclusively in the browser; `window` usage is intentional and idiomatic here.
#
# typescript:S6819: Replace ARIA role overrides with semantic HTML (false positives — see ADR-0002)
# CVCHint.tsx, Toggle.tsx, Timeline.tsx — role="img" on informative inline SVGs is the ARIA/MDN-recommended pattern.
# SelectList.tsx — role="listbox" on <ul> is the correct ARIA composite widget pattern; native <select> cannot replicate the custom UI.
# SelectListItem.tsx — role="option" on <li> is paired with the listbox above; both are intentional.
# CardInput.tsx — role="form" on <div> is intentional; native <form> risks invalid nested forms in merchant pages.
sonar.issue.ignore.multicriteria=prefer_globalthis,\
  s6819_cvc_hint,\
  s6819_toggle,\
  s6819_timeline,\
  s6819_select_list,\
  s6819_select_list_item,\
  s6819_card_input

sonar.issue.ignore.multicriteria.prefer_globalthis.ruleKey=typescript:S7764
sonar.issue.ignore.multicriteria.prefer_globalthis.resourceKey=**/*

sonar.issue.ignore.multicriteria.s6819_cvc_hint.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.s6819_cvc_hint.resourceKey=**/CVCHint.tsx

sonar.issue.ignore.multicriteria.s6819_toggle.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.s6819_toggle.resourceKey=**/Toggle.tsx

sonar.issue.ignore.multicriteria.s6819_timeline.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.s6819_timeline.resourceKey=**/Timeline.tsx

sonar.issue.ignore.multicriteria.s6819_select_list.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.s6819_select_list.resourceKey=**/Select/components/SelectList.tsx

sonar.issue.ignore.multicriteria.s6819_select_list_item.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.s6819_select_list_item.resourceKey=**/Select/components/SelectListItem.tsx

sonar.issue.ignore.multicriteria.s6819_card_input.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.s6819_card_input.resourceKey=**/Card/components/CardInput/CardInput.tsx