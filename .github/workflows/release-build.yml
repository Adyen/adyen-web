# This workflow will run tests using node and then publish a package when a release is created
# For more information see: https://help.github.com/actions/language-and-framework-guides/publishing-nodejs-packages

name: Build UMD and Translations

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-umd-and-translations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install Project Dependencies
        run: yarn install
      # Build
      - name: Build
        run: cd packages/lib && npm run build
        env:
          CI: true

      # Read SDK version from packages/lib/package.json
      - name: Read SDK version
        id: sdk-version
        run: echo "version=$(node -p "require('./packages/lib/package.json').version")" >> "$GITHUB_OUTPUT"

      # Upload UMD and translations
      - run: cp packages/server/translations/ packages/lib/dist/umd -r
      - uses: actions/upload-artifact@v7
        with:
          name: adyen-web-sdk-umd-and-translations-${{ steps.sdk-version.outputs.version }}
          path: packages/lib/dist/umd
