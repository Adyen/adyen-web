name: PR

on:
  pull_request:
  merge_group:
  workflow_dispatch:

jobs:
  unit-tests:
    uses: ./.github/workflows/unit-tests.yml
    secrets: inherit

  e2e-tests:
    uses: ./.github/workflows/e2e-tests.yml
    secrets: inherit

  automated-a11y:
    uses: ./.github/workflows/automated-a11y.yml
    secrets: inherit

  automated-visual:
    uses: ./.github/workflows/automated-visual.yml
    secrets: inherit

  # Gateway check for PRs — unit-tests, a11y, and visual must pass
  # WHY: E2E is optional on PR since some tests might be flaky.
  # This allows the PR author to attempt merge if they believe tests will pass in the merge queue.
  verify-pr:
    if: always()
    needs: [unit-tests, e2e-tests, automated-a11y, automated-visual]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/verify-jobs
        with:
          required: |
            {
              "unit-tests": "${{ needs.unit-tests.result }}",
              "automated-a11y": "${{ needs.automated-a11y.result }}",
              "automated-visual": "${{ needs.automated-visual.result }}"
            }

  # Stricter gateway check for merge queue — all jobs must pass
  verify-merge-queue:
    if: always() && github.event_name == 'merge_group'
    needs: [unit-tests, e2e-tests, automated-a11y, automated-visual]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/verify-jobs
        with:
          required: |
            {
              "unit-tests": "${{ needs.unit-tests.result }}",
              "e2e-tests": "${{ needs.e2e-tests.result }}",
              "automated-a11y": "${{ needs.automated-a11y.result }}",
              "automated-visual": "${{ needs.automated-visual.result }}"
            }
