name: PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 24
        package-manager-cache: false

    - name: Cache node modules
      id: node-modules-cache
      uses: actions/cache@v5
      env:
        cache-name: node-modules-v1
      with:
        path: node_modules
        key: ${{ runner.os }}-cache-${{ env.cache-name }}-yarn-${{ hashFiles('**/yarn.lock') }}

    - name: Enable Corepack
      run: corepack enable

    - name: Install Project Dependencies
      if: steps.node-modules-cache.outputs.cache-hit != 'true'
      run: yarn install --immutable

    - name: Lint files
      run: yarn lint

    - name: Type check files
      run: yarn type-check

    - name: Generate test coverage
      run: yarn test:coverage

  e2e:
    timeout-minutes: 120
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-version: ["v69", "v70", "v71"]
        runner-browser: ["chromium", "firefox", "webkit"]
    env:
      CHECKOUT_API_KEY: ${{secrets.ADYEN_CHECKOUT_API_KEY}}
      MERCHANT_ACCOUNT: ${{secrets.ADYEN_CHECKOUT_MERCHANT_ACCOUNT}}
      CLIENT_KEY: ${{secrets.ADYEN_CHECKOUT_CLIENT_KEY}}
      CLIENT_ENV: test
      TESTING_ENVIRONMENT: https://checkout-test.adyen.com/checkout/${{matrix.api-version}}
      API_VERSION: ${{matrix.api-version}}
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 24
        package-manager-cache: false

    - name: Cache node modules
      id: node-modules-cache
      uses: actions/cache@v5
      env:
        cache-name: node-modules-v1
      with:
        path: node_modules
        key: ${{ runner.os }}-cache-${{ env.cache-name }}-yarn-${{ hashFiles('**/yarn.lock') }}

    - name: Enable Corepack
      run: corepack enable

    - name: Install Project Dependencies
      if: steps.node-modules-cache.outputs.cache-hit != 'true'
      run: yarn install --immutable

    - name: Extract Playwright version
      id: playwright-version
      run: echo "PLAYWRIGHT_VERSION=$(jq -r '.devDependencies["@playwright/test"]' packages/e2e-playwright/package.json)" >> $GITHUB_ENV

    - name: Cache Playwright
      # Using a cache for the webkit binary files causes this error on subsequent runs
      # /home/runner/.cache/ms-playwright/webkit-2123/minibrowser-wpe/bin/MiniBrowser: error while loading shared libraries: libwoff2dec.so.1.0.2: cannot open shared object file: No such file or directory
      if: matrix.runner-browser != 'webkit'
      id: playwright-cache
      uses: actions/cache@v5
      env:
        cache-name: playwright-v1
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-cache-${{ env.cache-name }}-playwright-${{ env.PLAYWRIGHT_VERSION }}-browser-${{ matrix.runner-browser }}

    - name: Install Playwright Dependencies
      if: steps.playwright-cache.outputs.cache-hit != 'true' || matrix.runner-browser == 'webkit'
      run: npx playwright install --with-deps ${{ matrix.runner-browser }}

    - name: Run E2E Tests
      run: yarn test:e2e --project=${{ matrix.runner-browser }}

    - name: Archive test result artifacts
      id: upload-artifact
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: playwright-report-${{matrix.api-version}}-${{matrix.runner-browser}}-${{ github.sha }}
        path: packages/e2e-playwright/playwright-report
        retention-days: 5

  automated-a11y:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-version: ["v71"]
        runner-browser: ["chromium"]
    env:
      CHECKOUT_API_KEY: ${{secrets.ADYEN_CHECKOUT_API_KEY}}
      MERCHANT_ACCOUNT: ${{secrets.ADYEN_CHECKOUT_MERCHANT_ACCOUNT}}
      CLIENT_KEY: ${{secrets.ADYEN_CHECKOUT_CLIENT_KEY}}
      CLIENT_ENV: test
      TESTING_ENVIRONMENT: https://checkout-test.adyen.com/checkout/${{matrix.api-version}}
      API_VERSION: ${{matrix.api-version}}
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 24
        package-manager-cache: false

    - name: Cache node modules
      id: node-modules-cache
      uses: actions/cache@v5
      env:
        cache-name: node-modules-v1
      with:
        path: node_modules
        key: ${{ runner.os }}-cache-${{ env.cache-name }}-yarn-${{ hashFiles('**/yarn.lock') }}

    - name: Enable Corepack
      run: corepack enable

    - name: Install Project Dependencies
      if: steps.node-modules-cache.outputs.cache-hit != 'true'
      run: yarn install --immutable

    - name: Extract Playwright version
      id: playwright-version
      run: echo "PLAYWRIGHT_VERSION=$(jq -r '.devDependencies["@playwright/test"]' packages/e2e-playwright/package.json)" >> $GITHUB_ENV

    - name: Cache Playwright
      if: matrix.runner-browser != 'webkit'
      id: playwright-cache
      uses: actions/cache@v5
      env:
        cache-name: playwright-v1
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-cache-${{ env.cache-name }}-playwright-${{ env.PLAYWRIGHT_VERSION }}-browser-${{ matrix.runner-browser }}

    - name: Install Playwright Dependencies
      if: steps.playwright-cache.outputs.cache-hit != 'true' || matrix.runner-browser == 'webkit'
      run: npx playwright install --with-deps ${{ matrix.runner-browser }}

    - name: Run Automated Accessibility Tests
      run: yarn test:automated-a11y --project=${{ matrix.runner-browser }}

    - name: Archive test result artifacts
      id: upload-artifact
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: a11y-report-${{matrix.api-version}}-${{matrix.runner-browser}}-${{ github.sha }}
        path: packages/e2e-playwright/playwright-report
        retention-days: 5

  automated-visual:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-version: ["v71"]
        runner-browser: ["chromium"]
    env:
      CHECKOUT_API_KEY: ${{secrets.ADYEN_CHECKOUT_API_KEY}}
      MERCHANT_ACCOUNT: ${{secrets.ADYEN_CHECKOUT_MERCHANT_ACCOUNT}}
      CLIENT_KEY: ${{secrets.ADYEN_CHECKOUT_CLIENT_KEY}}
      CLIENT_ENV: test
      TESTING_ENVIRONMENT: https://checkout-test.adyen.com/checkout/${{matrix.api-version}}
      API_VERSION: ${{matrix.api-version}}
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 24
        package-manager-cache: false

    - name: Cache node modules
      id: node-modules-cache
      uses: actions/cache@v5
      env:
        cache-name: node-modules-v1
      with:
        path: node_modules
        key: ${{ runner.os }}-cache-${{ env.cache-name }}-yarn-${{ hashFiles('**/yarn.lock') }}

    - name: Enable Corepack
      run: corepack enable

    - name: Install Project Dependencies
      if: steps.node-modules-cache.outputs.cache-hit != 'true'
      run: yarn install --immutable

    - name: Extract Playwright version
      id: playwright-version
      run: echo "PLAYWRIGHT_VERSION=$(jq -r '.devDependencies["@playwright/test"]' packages/e2e-playwright/package.json)" >> $GITHUB_ENV

    - name: Cache Playwright
      if: matrix.runner-browser != 'webkit'
      id: playwright-cache
      uses: actions/cache@v5
      env:
        cache-name: playwright-v1
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-cache-${{ env.cache-name }}-playwright-${{ env.PLAYWRIGHT_VERSION }}-browser-${{ matrix.runner-browser }}

    - name: Install Playwright Dependencies
      if: steps.playwright-cache.outputs.cache-hit != 'true' || matrix.runner-browser == 'webkit'
      run: npx playwright install --with-deps ${{ matrix.runner-browser }}

    - name: Run Automated Visual Tests
      run: yarn test:automated-visual --project=${{ matrix.runner-browser }}

    - name: Archive test result artifacts
      id: upload-artifact
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: visual-report-${{matrix.api-version}}-${{matrix.runner-browser}}-${{ github.sha }}
        path: packages/e2e-playwright/playwright-report
        retention-days: 5

  # Gateway check for PRs — only unit-tests and e2e must pass
  verify-pr:
    if: always()
    needs: [unit-tests, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Check required job results
        run: |
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "unit-tests failed with result: ${{ needs.unit-tests.result }}"
            exit 1
          fi
          if [[ "${{ needs.e2e.result }}" != "success" ]]; then
            echo "e2e failed with result: ${{ needs.e2e.result }}"
            exit 1
          fi

  # Stricter gateway check for merge queue — all jobs must pass
  verify-merge-queue:
    if: always() && github.event_name == 'merge_group'
    needs: [unit-tests, e2e, automated-a11y, automated-visual]
    runs-on: ubuntu-latest
    steps:
      - name: Check all job results
        run: |
          failed=""
          for job in unit-tests e2e automated-a11y automated-visual; do
            result=""
            case $job in
              unit-tests) result="${{ needs.unit-tests.result }}" ;;
              e2e) result="${{ needs.e2e.result }}" ;;
              automated-a11y) result="${{ needs.automated-a11y.result }}" ;;
              automated-visual) result="${{ needs.automated-visual.result }}" ;;
            esac
            if [[ "$result" != "success" ]]; then
              echo "$job failed with result: $result"
              failed="true"
            fi
          done
          if [[ "$failed" == "true" ]]; then
            exit 1
          fi
