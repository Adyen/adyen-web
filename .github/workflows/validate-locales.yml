name: Validate Locales

on:
    workflow_call:

jobs:
    validate-locales:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Enable Corepack
              run: corepack enable

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install dependencies
              run: yarn install --immutable

            - name: Validate locales
              run: yarn validate:locales
