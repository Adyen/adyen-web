name: Slack Release Notification

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        description: SDK version to include in the notification
        required: false
        type: string

jobs:
  notify-slack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve SDK version
        id: sdk-version
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(node -p "require('./packages/lib/package.json').version")" >> "$GITHUB_OUTPUT"
          fi

      - name: Post Slack notification - start
        id: slack-start
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          VERSION: ${{ steps.sdk-version.outputs.version }}
        run: |
          response=$(curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\": \"${{ vars.WEB_RELEASE_NOTES_SLACK_ID }}\", \"text\": \":rocket: A new SDK release is in progress: *v${VERSION}*\"}")
          echo "ts=$(echo "$response" | jq -r '.ts')" >> "$GITHUB_OUTPUT"

      - name: Post Slack notification - done
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          VERSION: ${{ steps.sdk-version.outputs.version }}
          THREAD_TS: ${{ steps.slack-start.outputs.ts }}
        run: |
          curl -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\": \"${{ vars.WEB_RELEASE_NOTES_SLACK_ID }}\", \"thread_ts\": \"$THREAD_TS\", \"text\": \"Hey team. We released a new SDK version. The notes can be found here: https://github.com/Adyen/adyen-web/releases/tag/v${VERSION}\nThank you!\"}"

  notify-triggering-user:
    needs: notify-slack
    if: always()
    uses: ./.github/workflows/slack-user-notification.yml
    with:
      status: ${{ needs.notify-slack.result }}
      workflow_name: Slack Release Notification
    secrets: inherit
