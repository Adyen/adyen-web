name: Strict TypeScript Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  strict-scan:
    runs-on: ubuntu-latest
    # Non-blocking: this job is informational only and will never prevent merging.
    continue-on-error: true

    steps:
      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      # ── Get baseline from master ──
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Install dependencies (master)
        run: yarn install --immutable

      - name: Get strict error baseline from master
        id: baseline
        run: |
          OUTPUT=$(yarn validate:strict 2>&1 || true)
          TOTAL=$(echo "$OUTPUT" | grep -c "error TS" || true)
          ERRORS=$(echo "$OUTPUT" | grep -oE "error TS[0-9]+" || true)
          if [ -n "$ERRORS" ]; then
            CODES_JSON=$(echo "$ERRORS" | sed 's/error //' | sort | uniq -c | sort -rn | awk 'BEGIN{printf "{"} NR>1{printf ","} {printf "\"%s\":%d",$2,$1} END{printf "}"}')
          else
            CODES_JSON='{}'
          fi
          echo "count=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "codes=$CODES_JSON" >> "$GITHUB_OUTPUT"
          echo "Master baseline — total: $TOTAL, codes: $CODES_JSON"

      # ── Check PR branch ──
      - uses: actions/checkout@v6
        with:
          clean: false
          fetch-depth: 1

      - name: Cache node modules
        id: node-modules-cache
        uses: actions/cache@v5
        env:
          cache-name: node-modules-v1
        with:
          path: node_modules
          key: ${{ runner.os }}-cache-${{ env.cache-name }}-yarn-${{ hashFiles('**/yarn.lock') }}

      - name: Install Project Dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: yarn install --immutable

      - name: Strict type check
        id: tsc-strict
        continue-on-error: true
        run: |
          TSC_STRICT_BASELINE=${{ steps.baseline.outputs.count }}
          OUTPUT=$(yarn validate:strict 2>&1 || true)
          ERROR_COUNT=$(echo "$OUTPUT" | grep -c "error TS" || true)
          ERRORS=$(echo "$OUTPUT" | grep -oE "error TS[0-9]+" || true)
          if [ -n "$ERRORS" ]; then
            CODES_JSON=$(echo "$ERRORS" | sed 's/error //' | sort | uniq -c | sort -rn | awk 'BEGIN{printf "{"} NR>1{printf ","} {printf "\"%s\":%d",$2,$1} END{printf "}"}')
          else
            CODES_JSON='{}'
          fi
          echo "error_count=$ERROR_COUNT" >> "$GITHUB_OUTPUT"
          echo "codes=$CODES_JSON" >> "$GITHUB_OUTPUT"
          echo "Current strict tsc errors: $ERROR_COUNT (baseline: $TSC_STRICT_BASELINE)"

          if [ "$ERROR_COUNT" -gt "$TSC_STRICT_BASELINE" ]; then
            echo "::warning::Strict tsc errors INCREASED from $TSC_STRICT_BASELINE to $ERROR_COUNT"
            exit 1
          fi

          if [ "$ERROR_COUNT" -lt "$TSC_STRICT_BASELINE" ]; then
            echo "::notice::Strict tsc errors decreased from $TSC_STRICT_BASELINE to $ERROR_COUNT"
          fi

      - name: Build comment body
        if: always()
        id: build-comment
        run: |
          B_TOTAL=${{ steps.baseline.outputs.count }}
          B_CODES='${{ steps.baseline.outputs.codes }}'
          [ -z "$B_CODES" ] && B_CODES='{}'
          PR_TOTAL="${{ steps.tsc-strict.outputs.error_count }}"
          PR_TOTAL="${PR_TOTAL:-N/A}"
          PR_CODES='${{ steps.tsc-strict.outputs.codes }}'
          [ -z "$PR_CODES" ] && PR_CODES='{}'

          if [ "${{ steps.tsc-strict.outcome }}" = "success" ]; then
            OVERALL_STATUS="✅ Pass"
          else
            OVERALL_STATUS="⚠️ Regression"
          fi

          # Generate per-code table rows with jq (sorted by PR count desc)
          TABLE_ROWS=$(jq -r -n \
            --argjson baseline "$B_CODES" \
            --argjson pr "$PR_CODES" '
            (($baseline | keys) + ($pr | keys)) | unique |
            map({ code: ., b: ($baseline[.] // 0), p: ($pr[.] // 0) }) |
            sort_by(-.p, -.b) | .[] |
            (if .p > .b then "⚠️ +\(.p - .b)"
             elif .p < .b then "✅ \(.p - .b)"
             else "✅ 0" end) as $delta |
            "| [`\(.code)`](https://typescript.tv/errors/\(.code)/) | \(.p) | \(.b) | \($delta) |"
          ')

          NUM_CODES=$(jq -n --argjson b "$B_CODES" --argjson p "$PR_CODES" '(($b | keys) + ($p | keys)) | unique | length')

          {
            echo 'body<<EOF'
            echo '## Strict TypeScript Scan Results'
            echo ''
            echo "**Total: ${PR_TOTAL} errors (baseline: ${B_TOTAL}) | ${OVERALL_STATUS}**"
            echo ''
            echo '<details>'
            echo "<summary>Per-code breakdown (${NUM_CODES} codes)</summary>"
            echo ''
            echo '| Error Code | PR | Baseline | Delta |'
            echo '|------------|-----|----------|-------|'
            echo "$TABLE_ROWS"
            echo ''
            echo '</details>'
            echo ''
            echo "_Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')_"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Find comment
        if: always()
        uses: peter-evans/find-comment@v4
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: Strict TypeScript Scan Results

      - name: Post scan summary
        if: always()
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.build-comment.outputs.body }}
          edit-mode: replace
