name: Strict TypeScript Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  strict-scan:
    runs-on: ubuntu-latest
    # Non-blocking: this job is informational only and will never prevent merging.
    continue-on-error: true

    env:
      # Current noImplicitAny error count from ts-errors.log.
      # Decrease this number each time strict errors are fixed.
      TSC_STRICT_BASELINE: 2103

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Cache node modules
        id: node-modules-cache
        uses: actions/cache@v5
        env:
          cache-name: node-modules-v1
        with:
          path: node_modules
          key: ${{ runner.os }}-cache-${{ env.cache-name }}-yarn-${{ hashFiles('**/yarn.lock') }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install Project Dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: yarn install --immutable

      - name: Strict type check
        id: tsc-strict
        continue-on-error: true
        run: |
          ERROR_COUNT=$(yarn validate:strict 2>&1 | grep -c "error TS" || true)
          echo "error_count=$ERROR_COUNT" >> "$GITHUB_OUTPUT"
          echo "Current strict tsc errors: $ERROR_COUNT (baseline: $TSC_STRICT_BASELINE)"

          if [ "$ERROR_COUNT" -gt "$TSC_STRICT_BASELINE" ]; then
            echo "::warning::Strict tsc errors INCREASED from $TSC_STRICT_BASELINE to $ERROR_COUNT"
            exit 1
          fi

          if [ "$ERROR_COUNT" -lt "$TSC_STRICT_BASELINE" ]; then
            echo "::notice::Strict tsc errors decreased to $ERROR_COUNT — consider updating TSC_STRICT_BASELINE"
          fi

      - name: Post scan summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const tscPassed = '${{ steps.tsc-strict.outcome }}' === 'success';
            const tscErrors = '${{ steps.tsc-strict.outputs.error_count }}' || 'N/A';
            const baseline = '${{ env.TSC_STRICT_BASELINE }}';

            const body = [
              '## Strict TypeScript Scan Results',
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| Typescript *noImplicitAny* (${tscErrors} errors, baseline: ${baseline}) | ${tscPassed ? '✅ Pass' : '⚠️ Regression'} |`,
              '',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
